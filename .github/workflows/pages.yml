# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]
  # Runs on pull requests to ensure builds are verified before merge
  pull_request:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow pushing to gh-pages branch
permissions:
  contents: write

# Concurrency group distinct from system Pages deployment to avoid deadlocks
concurrency:
  group: "pages-build-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Cache Extension Tester JAR
        id: cache-tester
        uses: actions/cache@v4
        with:
          path: bin/
          key: ${{ runner.os }}-tester-${{ hashFiles('dev-setup.sh') }}
      - name: Generate Index
        run: |
          ./dev-setup.sh --tester
          java -jar bin/extension-tester.jar --ci --generate-index
          
          # Build root directory structure
          mkdir -p public
          cp -r src public/
          cp -r lib public/
          cp index.json public/
          touch public/.nojekyll
          
          # Build duplicate legacy master/ directory structure for backward compatibility
          mkdir -p public/master
          cp -r src public/master/
          cp -r lib public/master/
          cp index.json public/master/
          touch public/master/.nojekyll
      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
